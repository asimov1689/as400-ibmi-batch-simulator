<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="450" viewBox="0 0 1500 450" role="img" aria-labelledby="title desc">
  <title id="title">Successful RPGLE compilation output</title>
  <desc id="desc">Sanitized terminal-style output showing an RPGLE program compiled successfully with zero highest severity.</desc>
  <rect width="1500" height="450" rx="8" fill="#101314"/>
  <rect x="0" y="0" width="1500" height="42" rx="8" fill="#1f2426"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="21" r="6" fill="#28c840"/>
  <text x="96" y="27" fill="#c9d1d9" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="16">IBM i compile session - sanitized</text>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="18" fill="#d7dde2" xml:space="preserve">
    <text x="34" y="82">$ system "CRTSQLRPGI OBJ(&lt;LIBRARY&gt;/&lt;PROGRAM&gt;)</text>
    <text x="34" y="116">          SRCFILE(&lt;LIBRARY&gt;/&lt;SOURCE_FILE&gt;) SRCMBR(&lt;SOURCE_MEMBER&gt;)</text>
    <text x="34" y="150">          OBJTYPE(*PGM) COMMIT(*NONE) CLOSQLCSR(*ENDMOD)"</text>
    <text x="34" y="202" fill="#9cdcfe">RNS9304:</text>
    <text x="122" y="202">Program &lt;PROGRAM&gt; placed in library &lt;LIBRARY&gt;.</text>
    <text x="34" y="240">00 highest severity.</text>
    <text x="34" y="288" fill="#b5cea8">Result:</text>
    <text x="112" y="288">RPGLE program with embedded Db2 for i SQL</text>
    <text x="34" y="326">compiled successfully.</text>
    <text x="34" y="384" fill="#8b949e">Sensitive values intentionally replaced with placeholders.</text>
  </g>
</svg>
